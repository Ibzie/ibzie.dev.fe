services:
  postgres:
    image: postgres:16-alpine
    container_name: ibzie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ibzie
      POSTGRES_PASSWORD: ibzie
      POSTGRES_DB: ibzie
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  soft-serve:
    image: charmcli/soft-serve:latest
    container_name: ibzie-git
    restart: unless-stopped
    ports:
      - "23231:23231"
      - "23232:23232"
    volumes:
      - ./data/soft-serve:/soft-serve/.soft-serve
      - ./data/soft-serve/repos:/soft-serve/.repos
    environment:
      SOFT_SERVE_HOST: git.ibzie.dev
      SOFT_SERVE_NAME: "Ibz's git server"
      SOFT_SERVE_INITIAL_ADMIN_KEYS: "${SOFT_SERVE_ADMIN_KEY:-}"
    command: soft serve

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ibzie-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ibzie:ibzie@postgres:5432/ibzie
      PORT: "8080"
      RUST_LOG: info
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: ibzie-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
